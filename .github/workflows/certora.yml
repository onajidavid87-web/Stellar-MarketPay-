name: Certora Formal Verification

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'contracts/marketpay-contract/src/**'
      - 'contracts/certora/**'
      - '.github/workflows/certora.yml'
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'contracts/marketpay-contract/src/**'
      - 'contracts/certora/**'
      - '.github/workflows/certora.yml'

jobs:
  verify:
    name: Run Certora Prover
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install certora-cli-beta
          cargo install rustfilt || true

      - name: Run Certora Prover
        env:
          CERTORAKEY: ${{ secrets.CERTORAKEY }}
        run: |
          if [ -z "$CERTORAKEY" ]; then
            echo "::error::CERTORAKEY secret is missing. Skipping verification run."
            exit 1
          fi
          certoraSorobanProver contracts/certora/config.conf
